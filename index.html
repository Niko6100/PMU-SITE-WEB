<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PMU Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>PMU Finder</h2>

    <!-- AUTH -->
    <div class="auth">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Mot de passe">
      <button id="signup">Créer</button>
      <button id="login">Login</button>
      <button id="logout">Logout</button>
      <p id="userEmail"></p>
    </div>

    <!-- SEARCH -->
    <input id="search" placeholder="Rechercher..." />

    <!-- ADD PMU -->
    <button id="addBtn">➕ Ajouter un PMU</button>

    <h3 id="count">0 PMU trouvés</h3>

    <div id="list"></div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<!-- FORM AJOUT -->
<div id="formPopup" class="popup hidden">
  <input id="name" placeholder="Nom">
  <input id="address" placeholder="Adresse">
  <input id="phone" placeholder="Téléphone">
  <input id="lat" placeholder="Latitude">
  <input id="lng" placeholder="Longitude">
  <button id="submitPMU">Valider</button>
</div>

<!-- FICHE PMU -->
<div id="pmuCard" class="pmu-card hidden"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
