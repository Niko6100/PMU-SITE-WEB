<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PMU Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>PMU Finder</h2>

    <div class="nav">
      <a href="auth.html">🔐 Connexion</a>
      <a href="profile.html">👤 Profil</a>
    </div>

    <input id="search" placeholder="Rechercher..." />

    <button id="addBtn">➕ Ajouter un PMU</button>

    <h3 id="count">0 PMU trouvés</h3>

    <div id="list"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<!-- POPUP -->
<div id="formPopup" class="popup hidden">
  <div class="form-card">

    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <div id="stepContent"></div>

    <div class="step-nav">
      <button id="prevBtn">← Retour</button>
      <button id="nextBtn">Suivant →</button>
    </div>

  </div>
</div>

<!-- PMU CARD -->
<div id="pmuCard" class="pmu-card hidden"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
