<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <div class="profile-card">
    <div class="avatar">👤</div>
    <h2 id="email"></h2>
    <button id="logout">Se déconnecter</button>
  </div>

  <div class="stats">

    <div class="stat">
      <h3 id="countPMU">0</h3>
      <p>PMU ajoutés</p>
    </div>

    <div class="stat">
      <h3 id="countFav">0</h3>
      <p>Favoris ❤️</p>
    </div>

    <div class="stat">
      <h3 id="avgNote">0</h3>
      <p>Note moyenne ⭐</p>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="profile.js"></script>

</body>
</html>
